# Reusable workflow to render and diff helm charts between the head and base ref of a pull request
# A comment is made on the pull request containing the diff output

name: render and diff helm charts
on:
  workflow_call:
    inputs:
      automerge_test:
        description: Run confest against helm diff output to evaluate if PR is safe to automerge
        default: false
        required: false
        type: boolean

jobs:
  get_changed_helm_charts:
    runs-on: ubuntu-latest
    outputs:
      matrix_charts: ${{ steps.find_changed_charts.outputs.matrix_changed_charts }}
      charts: ${{ steps.find_changed_charts.outputs.changed_charts }}
    steps:
      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
         fetch-depth: '100'
         persist-credentials: true # We are using these credentials in later steps

      - name: find changed helm charts
        id: find_changed_charts
        run: |
          git fetch origin ${GITHUB_BASE_REF}:${GITHUB_BASE_REF}
          echo matrix_changed_charts=$(git diff --name-only ${GITHUB_BASE_REF}...HEAD -- '**/k8s/**/*.yaml' '**/k8s/**/*.yml' '**/k8s/**/*.tpl' '**/k8s/**/*.tmpl' | cut -d'/' -f1,2,3 | uniq | jq -R 'split("\n")' | jq -s 'flatten(1)') >> $GITHUB_OUTPUT
          echo changed_charts=$(git diff --name-only ${GITHUB_BASE_REF}...HEAD -- '**/k8s/**/*.yaml' '**/k8s/**/*.yml' '**/k8s/**/*.tpl' '**/k8s/**/*.tmpl' | cut -d'/' -f1,2,3 | uniq) >> $GITHUB_OUTPUT
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}

  render_charts:
    runs-on: ubuntu-latest
    needs: get_changed_helm_charts
    strategy:
      matrix:
        chart: ${{ fromJSON(needs.get_changed_helm_charts.outputs.matrix_charts) }}
        ref:
          - name: base
            sha: ${{ github.base_ref }}
          - name: head
            sha: ${{ github.head_ref }}
    steps:
      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: true # We are using these credentials in later steps
          ref: ${{ matrix.ref.sha }}

      - name: setup helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 #v4.3.1

      - name: render ${{ matrix.chart }} from ${{ matrix.ref.name }} ref
        id: render
        run: |
          mkdir -p shared/${MATRIX_REF_NAME}-charts
          if [ -f "${MATRIX_CHART}/Chart.yaml" ]; then
            helm dependency update "${MATRIX_CHART}"
            values_files=$(find "$MATRIX_CHART" -maxdepth 1 -type f \( -name '*values*.yaml' -o -name '*values*.yml' \) ! \( -name 'values.yaml' -o -name 'values.yml' \))

            for values_path in ${values_files}; do
              values_file=$(basename "$values_path")
              env=$(echo "$values_file" | sed -E 's/^values-([a-z0-9]+)(-.+)?\.yaml$/\1/')
              region=$(echo "$values_file" | sed -nE "s/^values-${env}-(.+)\.yaml$/\1/p")

              output_name=$(basename "$values_file" .yaml)
              render_path="shared/${MATRIX_REF_NAME}-charts/${MATRIX_CHART}/${output_name}"
              mkdir -p "$render_path"

              if [[ -n "$region" && -f "${MATRIX_CHART}/values-${env}.yaml" ]]; then
                # Render with three layers: base, env, env-region
                helm template "${MATRIX_CHART}" \
                  -f "${MATRIX_CHART}/values.yaml" \
                  -f "${MATRIX_CHART}/values-${env}.yaml" \
                  -f "${MATRIX_CHART}/${values_file}" \
                  --output-dir "$render_path"
              else
                # Only base + environment file
                helm template "${MATRIX_CHART}" \
                  -f "${MATRIX_CHART}/values.yaml" \
                  -f "${MATRIX_CHART}/${values_file}" \
                  --output-dir "$render_path"
              fi
           done
          fi
          echo sanitized_name=$(echo "${MATRIX_CHART}" | sed 's/\//-/g') >> $GITHUB_OUTPUT
        env:
          MATRIX_CHART: ${{ matrix.chart }}
          MATRIX_REF_NAME: ${{ matrix.ref.name }}

      - name: upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
        with:
          name: "shared-${{ matrix.ref.name }}-${{ steps.render.outputs.sanitized_name }}"
          path: "shared"

  diff_helm_charts:
    runs-on: ubuntu-latest
    needs:
      - get_changed_helm_charts
      - render_charts
    steps:
      - name: download artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 #v8.0.0
        with:
          pattern: shared-*
          merge-multiple: true
          path: "shared"

      - name: diff helm charts
        id: diff_helm_charts
        run: |
          for chart in ${CHARTS}; do
            chart_diff_output=$(diff -r "shared/base-charts/${chart}" "shared/head-charts/${chart}" || true)
            if [ -n "$chart_diff_output" ]; then
              echo -e "Changes found in chart: ${chart}\n$(diff -ruN shared/base-charts/${chart} shared/head-charts/${chart})\n" >> diff.log
            fi
          done
        env:
          CHARTS: ${{ needs.get_changed_helm_charts.outputs.charts }}

      - name: post diff as comment on pull request
        if: needs.get_changed_helm_charts.outputs.charts != ''
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require('fs');
            const comment_char_limit = 65536; // GitHub comment character limit
            const diff_file = 'diff.log';

            if (fs.existsSync(diff_file)) {
              var diff = fs.readFileSync(diff_file, 'utf8');
            } else {
              console.log(diff_file + " not found")
              return
            }

            function splitComment(comment, maxSize, sepEnd, sepStart, comStart) {
              // Adapted from Atlantis SplitComment function
              // https://github.com/runatlantis/atlantis/blob/main/server/events/vcs/common/common.go#L18
              if (comment.length <= (comment_char_limit - comStart.length)) {
                return [comStart + diff]
              }
              maxWithSep = comment_char_limit - sepEnd.length - sepStart.length;
              var comments = [];
              var numComments = Math.ceil(comment.length / maxWithSep);
              for (var i = 0; i < numComments; i++) {
                var upTo = Math.min(comment.length, (i + 1) * maxWithSep);
                var portion = comment.slice(i * maxWithSep, upTo);
                if (i < numComments - 1) {
                  portion += sepEnd;
                }
                if (i > 0) {
                  portion = sepStart + portion
                } else {
                  portion = comStart + portion
                }
                comments.push(portion);
              }
              return comments;
            }

            var sepEnd = "\n```\n</details>" + "\n<br>\n\n**Warning**: Output length greater than max comment size. Continued in next comment.";
            var sepStart = "Continued from previous comment.\n<details><summary>Show Output</summary>\n\n" + "```diff\n";
            var comStart = "Changes found in Helm charts.\n<details><summary>Show Output</summary>\n\n" + "```diff\n";

            comments = splitComment(diff, comment_char_limit, sepEnd, sepStart, comStart);

            for (const comment of comments) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              })
            }

  evaulate_helm_chart_automerge:
    if: inputs.automerge_test
    runs-on: ubuntu-latest
    needs:
      - get_changed_helm_charts
      - render_charts
    steps:
      - name: set commit status
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 #v9.0.0
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'pending',
              context: 'conftest test',
              description: '',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })

      - name: download artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 #v8.0.0
        with:
          pattern: shared-*
          merge-multiple: true
          path: "shared"

      # TODO Move this step into a separate action with tool cache support
      - name: install conftest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          gh release download v0.68.2 -R open-policy-agent/conftest -p "*_Linux_x86_64.tar.gz" -O - | tar xzf -
          mv conftest /usr/local/bin

      # TODO Move this step into a separate action with tool cache support
      - name: install diffnest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          gh release download v1.7.0 -R sters/diffnest -p "*_linux-amd64.tar.gz" -O - | tar xzf -
          mv diffnest /usr/local/bin

      - name: structured diff
        env:
          CHARTS: ${{ needs.get_changed_helm_charts.outputs.charts }}
        run: |
          set -euo pipefail

          shopt -s nullglob

          for chart in ${CHARTS}; do
            # When adding or removing a values file the `render_charts` job will only render one side of the chart to be compared
            # Create the directory to be compared if it doesn't exist so `find` succeeds
            mkdir -p "shared/base-charts/${chart}" "shared/head-charts/${chart}"

            CONFIGS=`find "shared/base-charts/${chart}" "shared/head-charts/${chart}" -mindepth 1 -maxdepth 1 -type d -print0 | xargs --null basename -a | sort | uniq`

            mkdir -p diff/${chart}

            for config in ${CONFIGS}; do
              for dir in "shared/base-charts/${chart}/${config}" "shared/head-charts/${chart}/${config}"; do
                # Create the directory to be compared if it doesn't exist so `find` succeeds
                mkdir -p "${dir}"

                OUTPUT_FILE="${dir}.yaml"

                touch "$OUTPUT_FILE"

                # Recursively find and concatenate all files
                find "$dir" -type f | sort | while read -r file; do
                  cat "$file" >> "$OUTPUT_FILE"
                  echo "" >> "$OUTPUT_FILE"  # ensure newline between files
                done
              done

              diffnest --format json-patch "shared/base-charts/${chart}/${config}.yaml" "shared/head-charts/${chart}/${config}.yaml" > "diff/${chart}/${config}.json" || true
            done
          done

      - name: conftest test
        id: conftest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail

          CONFTEST_OUTPUT=$(conftest test --no-color --no-fail --strict --update https://raw.githubusercontent.com/mozilla/helm-charts/main/policy/helm-automerge.rego diff)
          CONFTEST_EXIT_CODE=$?
          STATUS_DESCRIPTION=$(echo "$CONFTEST_OUTPUT" | tail -1)

          echo "STATUS_DESCRIPTION=${STATUS_DESCRIPTION}" >> "$GITHUB_OUTPUT"
          echo "${STATUS_DESCRIPTION}" >> $GITHUB_STEP_SUMMARY
          if [ ${CONFTEST_EXIT_CODE} -eq 0 ]; then
            echo "STATUS_STATE=success" >> "$GITHUB_OUTPUT"
          else
            echo "STATUS_STATE=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: set commit status
        env:
          STATUS_DESCRIPTION: ${{ steps.conftest.outputs.STATUS_DESCRIPTION }}
          STATUS_STATE: ${{ steps.conftest.outputs.STATUS_STATE }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 #v9.0.0
        with:
          script: |
            const description = process.env.STATUS_DESCRIPTION
            const state = process.env.STATUS_STATE

            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: state,
              context: 'conftest test',
              description: description,
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })
