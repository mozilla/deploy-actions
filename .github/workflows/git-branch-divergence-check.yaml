name: Git Branch Divergence Check
# Blocks merging a PR when origin/main has landed commits to the same top-level
# directory since the branch diverged, preventing silent overwrites of intervening changes.
# Handles pull_request, merge_group, and (via workflow_call from a caller) issue_comment
# events through a single job.

on:
  workflow_call: {}

jobs:
  git-branch-divergence-check:
    name: Git Branch Divergence Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    env:
      PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Resolve PR head SHA
        id: pr
        run: |
          if [ -n "${PR_NUMBER}" ]; then
            HEAD_SHA=$(gh pr view "${PR_NUMBER}" --repo "${{ github.repository }}" --json headRefOid --jq .headRefOid)
          else
            # merge_group or other event without a PR number — fall through to github.ref
            HEAD_SHA=""
          fi
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"

      # A workflow run triggered by `issue_comment` attaches to the default branch's
      # HEAD, not the PR's commit, so the job's own check never surfaces on the PR and
      # branch protection can't require it. We therefore report the result against the
      # PR head SHA ourselves.
      #
      # We use the Commit Statuses API deliberately. A check run
      # created with the default GITHUB_TOKEN cannot choose its check suite — GitHub
      # grafts it onto an existing github-actions[bot] suite on that commit. If the PR
      # was closed/reopened (or pushed) since, a newer check suite exists in which this
      # check ran green, and required-status resolution favors the newest suite — so a
      # failure stranded in the older suite gets silently shadowed and the PR shows
      # green. Commit statuses have no suite concept: for a given context the latest
      # status by time always wins, so a later failure can never be shadowed.
      #
      # Post a `pending` status up front for UX; the status is keyed by (sha, context),
      # so there is no id to capture.
      #
      # Reference:
      # - https://stackoverflow.com/questions/59518627/github-action-for-issue-comment-doesnt-shown-in-checks-for-pr
      # - https://docs.github.com/en/rest/commits/statuses
      # - https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/collaborating-on-repositories-with-code-quality-features/troubleshooting-required-status-checks
      - name: Set pending status on PR head
        if: github.event_name == 'issue_comment'
        env:
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          if [ -z "${HEAD_SHA}" ]; then
            echo "::error::Could not resolve PR head SHA; cannot post commit status."
            exit 1
          fi
          gh api repos/${{ github.repository }}/statuses/${HEAD_SHA} \
            -f state=pending \
            -f context="git-branch-divergence-check/recheck" \
            -f description="Checking branch divergence..." \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0  # Full history required to compute merge-base correctly.
          # Use the resolved PR head SHA when available; falls back to github.ref
          # for merge_group events (which use a special merge queue ref).
          ref: ${{ steps.pr.outputs.head_sha || github.ref }}

      - name: Fetch origin/main
        run: |
          # Re-authenticate the remote so fetch works for private repos and forks.
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          git fetch origin main

      - name: Check for branch divergence
        id: divergence
        run: |
          # The commit where this PR branch diverged from main.
          MERGE_BASE=$(git merge-base HEAD origin/main)

          # Capture the top-level directory for any changed tracked file, at any depth.
          # Dotdirs (.github/, .claude/) are excluded; gitignored paths are excluded
          # implicitly because git diff only reports tracked files.
          ROOTS=$(git diff --name-only "${MERGE_BASE}" HEAD \
            | awk -F'/' 'NF > 1 && $1 !~ /^\./ { print $1 }' \
            | sort -u)

          if [ -z "$ROOTS" ]; then
            echo "No tracked roots touched by this PR. Guard not applicable."
            exit 0
          fi

          echo "Roots touched by this PR:"
          echo "$ROOTS"
          echo ""

          DIVERGED=false
          while IFS= read -r root; do
            NEWER=$(git log --oneline "${MERGE_BASE}..origin/main" -- "${root}/")
            if [ -n "$NEWER" ]; then
              echo "::error::Branch divergence detected: '$root'"
              echo "  origin/main has commits in this path since the branch diverged."
              echo "  Please rebase or merge main into your branch before merging this PR."
              echo "  Blocking commits:"
              git log --oneline "${MERGE_BASE}..origin/main" -- "${root}/" | sed 's/^/    /'
              echo ""
              DIVERGED=true
            else
              echo "OK: '$root' is current with main."
            fi
          done <<< "$ROOTS"

          if [ "${DIVERGED}" = "true" ]; then
            exit 1
          fi

          echo ""
          echo "All touched roots are up to date with main."

      # Post the final commit status (success/failure) against the PR head SHA.
      # `always()` runs this even when the divergence step fails — otherwise the
      # status would stay "pending" forever and block the PR.
      #
      # Reference:
      # - https://docs.github.com/en/rest/commits/statuses
      # - https://docs.github.com/en/actions/reference/workflows-and-actions/expressions#status-check-functions
      - name: Set final status on PR head
        if: always() && github.event_name == 'issue_comment'
        env:
          DIVERGENCE_OUTCOME: ${{ steps.divergence.outcome }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          if [ -z "${HEAD_SHA}" ]; then
            echo "::error::Could not resolve PR head SHA; cannot post commit status."
            exit 1
          fi
          if [ "${DIVERGENCE_OUTCOME}" = "success" ]; then
            STATE=success
            DESCRIPTION="Branch is current with main."
          else
            STATE=failure
            DESCRIPTION="Branch divergence detected; rebase or merge main."
          fi
          gh api repos/${{ github.repository }}/statuses/${HEAD_SHA} \
            -f state="${STATE}" \
            -f context="git-branch-divergence-check/recheck" \
            -f description="${DESCRIPTION}" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
